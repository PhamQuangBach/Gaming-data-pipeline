version: '3.8'
 
x-airflow-common:
  &airflow-common
  build: .
  image: apache/airflow:2.9.3-python3.11
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AZURE_FUNCTION_URL: ${AZURE_FUNCTION_URL}
    AZURE_FUNCTION_KEY: ${AZURE_FUNCTION_KEY}
    # dbt looks for profiles.yml here at runtime — see volumes below
    DBT_PROFILES_DIR: /opt/airflow/transform
    DBT_LOG_PATH: /opt/airflow/dbt_logs
    DBT_TARGET_PATH: /opt/airflow/dbt_target
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ../transform:/opt/airflow/transform
    - ../ingestion:/opt/airflow/ingestion
  depends_on:
    postgres:
      condition: service_healthy
 
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always
 
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin
 
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always
 
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
 
volumes:
  postgres-db-volume: