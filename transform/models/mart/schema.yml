version: 2

models:
  - name: mart_top_games
    description: "Games ranked by combined user + critic score. Primary analytics table."
    columns:
      - name: game_id
        tests:
          - unique
          - not_null
      - name: combined_score
        tests:
          - not_null
      - name: overall_rank
        tests:
          - unique
          - not_null

  - name: mart_genre_trends
    description: "Average ratings per genre per year. Used for trend analysis."
    columns:
      - name: genre_name
        tests:
          - not_null
      - name: release_year
        tests:
          - not_null

  - name: mart_daily_release_counts
    description: "Daily count of games released, with 7-day rolling and cumulative totals. One row per release date."
    columns:
      - name: released_date
        tests:
          - unique
          - not_null
      - name: games_released
        tests:
          - not_null
      - name: rolling_7day_release_count
        tests:
          - not_null
      - name: cumulative_release_count
        tests:
          - not_null