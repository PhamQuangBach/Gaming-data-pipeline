on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
 
jobs:
  dbt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
 
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
 
      - name: Install dbt-snowflake
        run: pip install dbt-snowflake==1.8.0
 
      - name: Write profiles.yml from secrets
        # We generate profiles.yml at runtime from GitHub Secrets —
        # it never exists as a committed file.
        working-directory: transform
        run: |
          cat > profiles.yml << EOT
          gaming_pipeline:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: "${{ secrets.SNOWFLAKE_ACCOUNT }}"
                user: "${{ secrets.SNOWFLAKE_USER }}"
                password: "${{ secrets.SNOWFLAKE_PASSWORD }}"
                warehouse: GAMING_WH
                database: GAMING_DB
                schema: STAGING
                threads: 2
          EOT
 
      - name: Show profiles.yml structure
        working-directory: transform
        run: sed 's/password:.*/password: "***REDACTED***"/' profiles.yml
 
      - name: dbt debug (verbose connection check)
        working-directory: transform
        run: dbt debug --profiles-dir . --target ci
 
      - name: Confirm profiles.yml landed where expected
        run: |
          echo "Workspace: ${{ github.workspace }}"
          ls -la ${{ github.workspace }}/transform/profiles.yml
 
      - name: dbt deps
        working-directory: transform
        run: dbt deps --profiles-dir . || true   # no-op if no packages.yml exists yet
 
      - name: dbt compile (catches SQL syntax errors)
        working-directory: transform
        run: dbt compile --profiles-dir .
 
      - name: dbt run
        working-directory: transform
        run: dbt run --profiles-dir .
 
      - name: dbt test
        working-directory: transform
        run: dbt test --profiles-dir .
 
      - name: dbt docs generate
        working-directory: transform
        run: dbt docs generate --profiles-dir .