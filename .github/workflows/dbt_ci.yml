name: dbt CI (compile, run, test)

# Runs whenever dbt code change
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
 
jobs:
  dbt:
    runs-on: ubuntu-latest
    env:
      DBT_PROFILES_DIR: ./transform
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
 
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
 
      - name: Install dbt-snowflake
        run: pip install dbt-snowflake==1.8.0
 
      - name: Write profiles.yml from secrets
        # Generate profiles.yml at runtime
        working-directory: transform
        run: |
          cat > profiles.yml << EOT
          gaming_pipeline:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: "${{ secrets.SNOWFLAKE_ACCOUNT }}"
                user: "${{ secrets.SNOWFLAKE_USER }}"
                password: "${{ secrets.SNOWFLAKE_PASSWORD }}"
                role: ""
                warehouse: GAMING_WH
                database: GAMING_DB
                schema: STAGING
                threads: 2
          EOT
 
      - name: dbt deps
        working-directory: transform
        run: dbt deps || true   # no-op if no packages.yml exists yet
 
      - name: dbt compile (catches SQL syntax errors)
        working-directory: transform
        run: dbt compile
 
      - name: dbt run
        working-directory: transform
        run: dbt run
 
      - name: dbt test
        working-directory: transform
        run: dbt test
 
      - name: dbt docs generate
        working-directory: transform
        run: dbt docs generate