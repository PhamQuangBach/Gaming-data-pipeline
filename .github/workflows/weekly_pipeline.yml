name: Weekly pipeline

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Azure Function ingestion
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.AZURE_FUNCTION_URL }}" \
            -H "x-functions-key: ${{ secrets.AZURE_FUNCTION_KEY }}" \
            -H "Content-Type: application/json")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "Response: $body"
          if [ "$http_code" -ne 200 ]; then
            echo "Ingestion failed with HTTP $http_code"
            exit 1
          fi
          status=$(echo "$body" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          if [ "$status" != "success" ]; then
            echo "Ingestion did not report success"
            exit 1
          fi

  dbt_run:
    needs: ingest   # only runs if the ingest job above succeeded
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dbt-snowflake
        run: pip install dbt-snowflake==1.8.0

      - name: Write profiles.yml from secrets
        working-directory: transform
        run: |
          cat > profiles.yml << EOT
          gaming_pipeline:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: "${{ secrets.SNOWFLAKE_ACCOUNT }}"
                user: "${{ secrets.SNOWFLAKE_USER }}"
                password: "${{ secrets.SNOWFLAKE_PASSWORD }}"
                warehouse: GAMING_WH
                database: GAMING_DB
                schema: STAGING
                threads: 2
          EOT

      - name: dbt run
        working-directory: transform
        run: dbt run --profiles-dir .

  dbt_test:
    needs: dbt_run   # only runs if dbt_run above succeeded
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dbt-snowflake
        run: pip install dbt-snowflake==1.8.0

      - name: Write profiles.yml from secrets
        working-directory: transform
        run: |
          cat > profiles.yml << EOT
          gaming_pipeline:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: "${{ secrets.SNOWFLAKE_ACCOUNT }}"
                user: "${{ secrets.SNOWFLAKE_USER }}"
                password: "${{ secrets.SNOWFLAKE_PASSWORD }}"
                warehouse: GAMING_WH
                database: GAMING_DB
                schema: STAGING
                threads: 2
          EOT

      - name: dbt test
        working-directory: transform
        run: dbt test --profiles-dir .

  embed_sync:
    needs: dbt_test   
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
 
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        working-directory: ingestion
        run: pip install -r requirements.txt
 
      - name: Run embedding sync
        working-directory: ingestion
        env:
          SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
          PG_HOST:             ${{ secrets.PG_HOST }}
          PG_PASSWORD:         ${{ secrets.PG_PASSWORD }}
          VOYAGE_API_KEY:      ${{ secrets.VOYAGE_API_KEY }}
        run: python embed_sync.py